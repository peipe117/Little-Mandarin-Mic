<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>華語小麥克 - 課文朗讀小助手</title>
  
  <!-- 引入 Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- 引入 React 與 ReactDOM -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  
  <!-- 引入 Babel 讓瀏覽器可以直接編譯 JSX -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  
  <!-- 引入 Canvas Confetti 撒花特效 -->
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

  <style>
    /* 可愛波點背景 */
    .bg-polka {
      background-image: radial-gradient(#fdba74 3px, transparent 3px);
      background-size: 32px 32px;
    }

    .pt-safe { padding-top: max(1rem, env(safe-area-inset-top)); }
    .pb-safe { padding-bottom: max(1rem, env(safe-area-inset-bottom)); }
    .safe-paddings {
      padding-top: max(2rem, env(safe-area-inset-top));
      padding-bottom: max(2rem, env(safe-area-inset-bottom));
    }

    .scrollbar-hide::-webkit-scrollbar { display: none; }
    .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
    
    @keyframes fade-in-up {
      0% { opacity: 0; transform: translateY(20px) scale(0.95); }
      100% { opacity: 1; transform: translateY(0) scale(1); }
    }
    .animate-fade-in-up {
      animation: fade-in-up 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
    }
    
    @keyframes fly {
      0% { transform: scale(1.6) rotate(-15deg) translateY(0px); }
      100% { transform: scale(1.6) rotate(15deg) translateY(-15px); }
    }
    
    @keyframes flyAwayCenter {
      0% { transform: scale(1.6) translate(0px, 0px) rotate(0deg); opacity: 1; }
      20% { transform: scale(4) translate(-80px, 80px) rotate(-15deg); opacity: 1; }
      40% { transform: scale(7) translate(-200px, 200px) rotate(15deg); opacity: 1; }
      60% { transform: scale(7) translate(-180px, 150px) rotate(-10deg); opacity: 1; }
      80% { transform: scale(5) translate(-50px, -150px) rotate(20deg); opacity: 0.8; }
      100% { transform: scale(3) translate(200px, -600px) rotate(15deg); opacity: 0; }
    }

    /* 氣球彈跳動畫 */
    @keyframes gentle-bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }
    .animate-gentle-bounce {
      animation: gentle-bounce 3s ease-in-out infinite;
    }
    
    /* 麥克風光暈 */
    @keyframes pulse-glow {
      0%, 100% { box-shadow: 0 0 0 0 rgba(251, 146, 60, 0.4); }
      50% { box-shadow: 0 0 0 20px rgba(251, 146, 60, 0); }
    }
    .recording-glow {
      animation: pulse-glow 1.5s infinite;
    }

    /* 漂浮食物動畫 */
    @keyframes float-around {
      0%, 100% { transform: translate(0, 0) rotate(0deg); }
      33% { transform: translate(15px, -25px) rotate(10deg); }
      66% { transform: translate(-15px, -15px) rotate(-5deg); }
    }
    .animate-float-around {
      animation: float-around ease-in-out infinite;
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // --- 圖示元件 ---
    const IconBase = ({ d, children, className, fill = "none" }) => (
      <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill={fill} stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" className={className}>
        {d && <path d={d} />}
        {children}
      </svg>
    );

    const Mic = (props) => <IconBase className={props.className} fill={props.fill}><path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" x2="12" y1="19" y2="22"/></IconBase>;
    const Square = (props) => <IconBase className={props.className} fill={props.fill}><rect width="16" height="16" x="4" y="4" rx="3" ry="3"/></IconBase>;
    const Play = (props) => <IconBase className={props.className} fill={props.fill}><polygon points="5 3 19 12 5 21 5 3"/></IconBase>;
    const Star = (props) => <IconBase className={props.className} fill={props.fill}><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></IconBase>;
    const Award = (props) => <IconBase className={props.className} fill={props.fill}><circle cx="12" cy="8" r="7"/><polyline points="8.21 13.89 7 23 12 20 17 23 15.79 13.88"/></IconBase>;
    const RefreshCw = (props) => <IconBase className={props.className} fill={props.fill}><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></IconBase>;
    const AlertCircle = (props) => <IconBase className={props.className} fill={props.fill}><circle cx="12" cy="12" r="10"/><line x1="12" x2="12" y1="8" y2="12"/><line x1="12" x2="12.01" y1="16" y2="16"/></IconBase>;
    const Type = (props) => <IconBase className={props.className} fill={props.fill}><polyline points="4 7 4 4 20 4 20 7"/><line x1="9" x2="15" y1="20" y2="20"/><line x1="12" x2="12" y1="4" y2="20"/></IconBase>;
    const Volume2 = (props) => <IconBase className={props.className} fill={props.fill}><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/></IconBase>;
    const Sparkles = (props) => <IconBase className={props.className} fill={props.fill} style={props.style}><path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z"/></IconBase>;
    const LinkIcon = (props) => <IconBase className={props.className} fill={props.fill}><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></IconBase>;
    const Check = (props) => <IconBase className={props.className} fill={props.fill}><polyline points="20 6 9 17 4 12"/></IconBase>;
    const HelpCircle = (props) => <IconBase className={props.className} fill={props.fill}><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/><line x1="12" x2="12.01" y1="17" y2="17"/></IconBase>;
    const Maximize = (props) => <IconBase className={props.className} fill={props.fill}><path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"/></IconBase>;
    const Globe = (props) => <IconBase className={props.className} fill={props.fill}><circle cx="12" cy="12" r="10"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/><path d="M2 12h20"/></IconBase>;

    // --- 背景食物裝飾資料 (靜態生成避免重繪閃爍) ---
    const CATERPILLAR_FOODS = ['🍎', '🍐', '🍑', '🍓', '🍊', '🍰', '🍦', '🥒', '🧀', '🌭', '🍭', '🍒', '🧁', '🍉', '🍃'];
    const BACKGROUND_DECORATIONS = Array.from({ length: 25 }).map((_, i) => ({
      id: i,
      emoji: CATERPILLAR_FOODS[Math.floor(Math.random() * CATERPILLAR_FOODS.length)],
      top: `${Math.random() * 90 + 5}%`,
      left: `${Math.random() * 90 + 5}%`,
      fontSize: `${Math.random() * 2 + 1.5}rem`,
      animationDuration: `${Math.random() * 10 + 15}s`,
      animationDelay: `${Math.random() * 5}s`,
      opacity: Math.random() * 0.15 + 0.05 // 在白底上稍微調淡一點 0.05 ~ 0.2
    }));

    const BackgroundDecorations = () => (
      <div className="absolute inset-0 overflow-hidden pointer-events-none z-0 rounded-[inherit]">
        {BACKGROUND_DECORATIONS.map(dec => (
          <div
            key={dec.id}
            className="absolute animate-float-around select-none"
            style={{
              top: dec.top,
              left: dec.left,
              fontSize: dec.fontSize,
              opacity: dec.opacity,
              animationDuration: dec.animationDuration,
              animationDelay: dec.animationDelay
            }}
          >
            {dec.emoji}
          </div>
        ))}
      </div>
    );

    // --- 課程資料 ---
    const LESSONS = [
      {
        id: 'L1', title: '第一課：新同學', titleEn: 'Lesson 1: New Classmates',
        sentences: [
          { text: "今天，我們有兩個新同學，現在請他們介紹自己。", zhuyinStr: "ㄐㄧㄣ ㄊㄧㄢ _ ㄨㄛˇ ㄇㄣ˙ ㄧㄡˇ ㄌㄧㄤˇ ㄍㄜ˙ ㄒㄧㄣ ㄊㄨㄥˊ ㄒㄩㄝˊ _ ㄒㄧㄢˋ ㄗㄞˋ ㄑㄧㄥˇ ㄊㄚ ㄇㄣ˙ ㄐㄧㄝˋ ㄕㄠˋ ㄗˋ ㄐㄧˇ _" },
          { text: "大家好，我叫方友朋，今年八歲，我最喜歡跟爸爸一起游泳。", zhuyinStr: "ㄉㄚˋ ㄐㄧㄚ ㄏㄠˇ _ ㄨㄛˇ ㄐㄧㄠˋ ㄈㄤ ㄧㄡˇ ㄆㄥˊ _ ㄐㄧㄣ ㄋㄧㄢˊ ㄅㄚ ㄙㄨㄟˋ _ ㄨㄛˇ ㄗㄨㄟˋ ㄒㄧˇ ㄏㄨㄢ ㄍㄣ ㄅㄚˋ ㄅㄚ˙ ㄧˋ ㄑㄧˇ ㄧㄡˊ ㄩㄥˇ _" },
          { text: "大家好，我叫張莉，今年七歲，我比較喜歡看書。", zhuyinStr: "ㄉㄚˋ ㄐㄧㄚ ㄏㄠˇ _ ㄨㄛˇ ㄐㄧㄠˋ ㄓㄤ ㄌㄧˋ _ ㄐㄧㄣ ㄋㄧㄢˊ ㄑㄧ ㄙㄨㄟˋ _ ㄨㄛˇ ㄅㄧˇ ㄐㄧㄠˋ ㄒㄧˇ ㄏㄨㄢ ㄎㄢˋ ㄕㄨ _" },
          { text: "你們好，我叫李大文。很高興認識你們。", zhuyinStr: "ㄋㄧˇ ㄇㄣ˙ ㄏㄠˇ _ ㄨㄛˇ ㄐㄧㄠˋ ㄌㄧˇ ㄉㄚˋ ㄨㄣˊ _ ㄏㄣˇ ㄍㄠ ㄒㄧㄥˋ ㄖㄣˋ ㄕ˙ ㄋㄧˇ ㄇㄣ˙ _" },
          { text: "歡迎你們來中文學校學華語。", zhuyinStr: "ㄏㄨㄢ ㄧㄥˊ ㄋㄧˇ ㄇㄣ˙ ㄌㄞˊ ㄓㄨㄥ ㄨㄣˊ ㄒㄩㄝˊ ㄒㄧㄠˋ ㄒㄩㄝˊ ㄏㄨㄚˊ ㄩˇ _" }
        ].map(s => ({ text: s.text, zhuyin: s.zhuyinStr.split(' ') }))
      },
      {
        id: 'L2', title: '第二課：我爸爸做生意', titleEn: 'Lesson 2: My Dad Does Business',
        sentences: [
          { text: "張莉，照片裡面的人是誰？", zhuyinStr: "ㄓㄤ ㄌㄧˋ _ ㄓㄠˋ ㄆㄧㄢˋ ㄌㄧˇ ㄇㄧㄢˋ ㄉㄜ˙ ㄖㄣˊ ㄕˋ ㄕㄟˊ _" },
          { text: "左邊是我外公，他以前是醫生，右邊是我外婆。", zhuyinStr: "ㄗㄨㄛˇ ㄅㄧㄢ ㄕˋ ㄨㄛˇ ㄨㄞˋ ㄍㄨㄥ _ ㄊㄚ ㄧˇ ㄑㄧㄢˊ ㄕˋ ㄧ ㄕㄥ _ ㄧㄡˋ ㄅㄧㄢ ㄕˋ ㄨㄛˇ ㄨㄞˋ ㄆㄛˊ _" },
          { text: "你爸爸媽媽做什麼工作？", zhuyinStr: "ㄋㄧˇ ㄅㄚˋ ㄅㄚ˙ ㄇㄚ ㄇㄚ˙ ㄗㄨㄛˋ ㄕㄣˊ ㄇㄜ˙ ㄍㄨㄥ ㄗㄨㄛˋ _" },
          { text: "我爸爸做生意，我媽媽幫他。你爸爸媽媽呢？", zhuyinStr: "ㄨㄛˇ ㄅㄚˋ ㄅㄚ˙ ㄗㄨㄛˋ ㄕㄥ ㄧˋ _ ㄨㄛˇ ㄇㄚ ㄇㄚ˙ ㄅㄤ ㄊㄚ _ ㄋㄧˇ ㄅㄚˋ ㄅㄚ˙ ㄇㄚ ㄇㄚ˙ ㄋㄜ˙ _" },
          { text: "我爸爸在電腦公司上班，我媽媽在銀行工作。", zhuyinStr: "ㄨㄛˇ ㄅㄚˋ ㄅㄚ˙ ㄗㄞˋ ㄉㄧㄢˋ ㄋㄠˇ ㄍㄨㄥ ㄙ ㄕㄤˋ ㄅㄢ _ ㄨㄛˇ ㄇㄚ ㄇㄚ˙ ㄗㄞˋ ㄧㄣˊ ㄏㄤˊ ㄍㄨㄥ ㄗㄨㄛˋ _" },
          { text: "你以後想做什麼？", zhuyinStr: "ㄋㄧˇ ㄧˇ ㄏㄡˋ ㄒㄧㄤˇ ㄗㄨㄛˋ ㄕㄣˊ ㄇㄜ˙ _" },
          { text: "我以後想跟爸爸一樣。", zhuyinStr: "ㄨㄛˇ ㄧˇ ㄏㄡˋ ㄒㄧㄤˇ ㄍㄣ ㄅㄚˋ ㄅㄚ˙ ㄧˊ ㄧㄤˋ _" }
        ].map(s => ({ text: s.text, zhuyin: s.zhuyinStr.split(' ') }))
      },
      {
        id: 'L3', title: '第三課：去超級市場', titleEn: 'Lesson 3: Going to the Supermarket',
        sentences: [
          { text: "媽媽，你要去哪裡？", zhuyinStr: "ㄇㄚ ㄇㄚ˙ _ ㄋㄧˇ ㄧㄠˋ ㄑㄩˋ ㄋㄚˇ ㄌㄧˇ _" },
          { text: "我要去附近的超級市場買東西，你要跟我一起去嗎？", zhuyinStr: "ㄨㄛˇ ㄧㄠˋ ㄑㄩˋ ㄈㄨˋ ㄐㄧㄣˋ ㄉㄜ˙ ㄔㄠ ㄐㄧˊ ㄕˋ ㄔㄤˇ ㄇㄞˇ ㄉㄨㄥ ㄒㄧ _ ㄋㄧˇ ㄧㄠˋ ㄍㄣ ㄨㄛˇ ㄧˋ ㄑㄧˇ ㄑㄩˋ ㄇㄚ˙ _" },
          { text: "要，我想去買巧克力冰淇淋。", zhuyinStr: "ㄧㄠˋ _ ㄨㄛˇ ㄒㄧㄤˇ ㄑㄩˋ ㄇㄞˇ ㄑㄧㄠˇ ㄎㄜˋ ㄌㄧˋ ㄅㄧㄥ ㄑㄧˊ ㄌㄧㄣˊ _" },
          { text: "你今天要買什麼？", zhuyinStr: "ㄋㄧˇ ㄐㄧㄣ ㄊㄧㄢ ㄧㄠˋ ㄇㄞˇ ㄕㄣˊ ㄇㄜ˙ _" },
          { text: "我今天要買魚、牛肉、青菜，還要買米。", zhuyinStr: "ㄨㄛˇ ㄐㄧㄣ ㄊㄧㄢ ㄧㄠˋ ㄇㄞˇ ㄩˊ _ ㄋㄧㄡˊ ㄖㄡˋ _ ㄑㄧㄥ ㄘㄞˋ _ ㄏㄞˊ ㄧㄠˋ ㄇㄞˇ ㄇㄧˇ _" },
          { text: "我也可以買糖果嗎？", zhuyinStr: "ㄨㄛˇ ㄧㄝˇ ㄎㄜˇ ㄧˇ ㄇㄞˇ ㄊㄤˊ ㄍㄨㄛˇ ㄇㄚ˙ _" },
          { text: "我們去看一下吧！", zhuyinStr: "ㄨㄛˇ ㄇㄣ˙ ㄑㄩˋ ㄎㄢˋ ㄧˊ ㄒㄧㄚˋ ㄅㄚ˙ _" }
        ].map(s => ({ text: s.text, zhuyin: s.zhuyinStr.split(' ') }))
      },
      {
        id: 'L4', title: '第四課：我想吃漢堡', titleEn: 'Lesson 4: I Want a Hamburger',
        sentences: [
          { text: "我想吃漢堡跟薯條，我們可不可以出去吃？", zhuyinStr: "ㄨㄛˇ ㄒㄧㄤˇ ㄔ ㄏㄢˋ ㄅㄠˇ ㄍㄣ ㄕㄨˇ ㄊㄧㄠˊ _ ㄨㄛˇ ㄇㄣ˙ ㄎㄜˇ ㄅㄨˋ ㄎㄜˇ ㄧˇ ㄔㄨ ㄑㄩˋ ㄔ _" },
          { text: "今天先在家吃，週末再出去吃吧！", zhuyinStr: "ㄐㄧㄣ ㄊㄧㄢ ㄒㄧㄢ ㄗㄞˋ ㄐㄧㄚ ㄔ _ ㄓㄡ ㄇㄛˋ ㄗㄞˋ ㄔㄨ ㄑㄩˋ ㄔ ㄅㄚ˙ _" },
          { text: "今天晚餐想吃什麼？", zhuyinStr: "ㄐㄧㄣ ㄊㄧㄢ ㄨㄢˇ ㄘㄢ ㄒㄧㄤˇ ㄔ ㄕㄣˊ ㄇㄜ˙ _" },
          { text: "我想吃麵。文文，你呢？", zhuyinStr: "ㄨㄛˇ ㄒㄧㄤˇ ㄔ ㄇㄧㄢˋ _ ㄨㄣˊ ㄨㄣˊ _ ㄋㄧˇ ㄋㄜ˙ _" },
          { text: "我想吃蛋炒飯，有湯嗎？", zhuyinStr: "ㄨㄛˇ ㄒㄧㄤˇ ㄔ ㄉㄢˋ ㄔㄠˇ ㄈㄢˋ _ ㄧㄡˇ ㄊㄤ ㄇㄚ˙ _" },
          { text: "我已經做了玉米湯。", zhuyinStr: "ㄨㄛˇ ㄧˇ ㄐㄧㄥ ㄗㄨㄛˋ ㄌㄜ˙ ㄩˋ ㄇㄧˇ ㄊㄤ _" },
          { text: "媽，我現在很餓，想快點吃晚飯，好嗎？", zhuyinStr: "ㄇㄚ _ ㄨㄛˇ ㄒㄧㄢˋ ㄗㄞˋ ㄏㄣˇ ㄜˋ _ ㄒㄧㄤˇ ㄎㄨㄞˋ ㄉㄧㄢˇ ㄔ ㄨㄢˇ ㄈㄢˋ _ ㄏㄠˇ ㄇㄚ˙ _" }
        ].map(s => ({ text: s.text, zhuyin: s.zhuyinStr.split(' ') }))
      },
      {
        id: 'L5', title: '第五課：春天快到了', titleEn: 'Lesson 5: Spring is Coming',
        sentences: [
          { text: "你看！樹葉變黃了，秋天快到了。", zhuyinStr: "ㄋㄧˇ ㄎㄢˋ _ ㄕㄨˋ ㄧㄝˋ ㄅㄧㄢˋ ㄏㄨㄤˊ ㄌㄜ˙ _ ㄑㄧㄡ ㄊㄧㄢ ㄎㄨㄞˋ ㄉㄠˋ ㄌㄜ˙ _" },

    let audioCtx = null;

    const playSound = (type) => {
      if (!audioCtx) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      }
      if (audioCtx.state === 'suspended') {
        audioCtx.resume();
      }
      
      const ctx = audioCtx;
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      
      osc.connect(gain);
      gain.connect(ctx.destination);
      
      if (type === 'level-clear') {
        osc.type = 'sine';
        osc.frequency.setValueAtTime(523.25, ctx.currentTime);       
        osc.frequency.setValueAtTime(659.25, ctx.currentTime + 0.15); 
        osc.frequency.setValueAtTime(783.99, ctx.currentTime + 0.3);  
        osc.frequency.setValueAtTime(1046.50, ctx.currentTime + 0.45); 
        gain.gain.setValueAtTime(0.1, ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.00001, ctx.currentTime + 0.8);
        osc.start(ctx.currentTime);
        osc.stop(ctx.currentTime + 0.8);
      } else if (type === 'success') {
        osc.type = 'sine';
        osc.frequency.setValueAtTime(523.25, ctx.currentTime);
        osc.frequency.setValueAtTime(659.25, ctx.currentTime + 0.1);
        osc.frequency.setValueAtTime(783.99, ctx.currentTime + 0.2);
        gain.gain.setValueAtTime(0.1, ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.00001, ctx.currentTime + 0.5);
        osc.start(ctx.currentTime);
        osc.stop(ctx.currentTime + 0.5);
      } else if (type === 'mild-success') {
        osc.type = 'sine';
        osc.frequency.setValueAtTime(523.25, ctx.currentTime);
        osc.frequency.setValueAtTime(659.25, ctx.currentTime + 0.15);
        gain.gain.setValueAtTime(0.1, ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.00001, ctx.currentTime + 0.4);
        osc.start(ctx.currentTime);
        osc.stop(ctx.currentTime + 0.4);
      } else if (type === 'try-again') {
        osc.type = 'triangle';
        osc.frequency.setValueAtTime(392.00, ctx.currentTime);
        osc.frequency.setValueAtTime(329.63, ctx.currentTime + 0.2);
        gain.gain.setValueAtTime(0.1, ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.00001, ctx.currentTime + 0.4);
        osc.start(ctx.currentTime);
        osc.stop(ctx.currentTime + 0.4);
      } else if (type === 'pop') {
        osc.type = 'sine';
        osc.frequency.setValueAtTime(800, ctx.currentTime);
        gain.gain.setValueAtTime(0.05, ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.00001, ctx.currentTime + 0.1);
        osc.start(ctx.currentTime);
        osc.stop(ctx.currentTime + 0.1);
      }
    };

    const getTrackNodes = (total) => {
      const fruits = ['🍎', '🍐', '🍑', '🍓', '🍊', '🍉', '🍇', '🍒']; 
      const nodes = [];
      for (let i = 0; i < total; i++) {
        if (i === total - 1) nodes.push('🦋'); 
        else if (i === total - 2) nodes.push('🏠'); 
        else if (i === total - 3) nodes.push('🍃'); 
        else nodes.push(fruits[i % fruits.length]); 
      }
      return nodes;
    };

      }, []);

        const urlParams = new URLSearchParams(window.location.search);
        const lessonParam = urlParams.get('lesson');
        
        if (lessonParam) {
          const foundLesson = LESSONS.find(l => l.id === lessonParam);
          if (foundLesson) {
            setSelectedLesson(foundLesson);
          }
        }
      }, []);

          });
        }
      }, [showSuccessScreen]);

      useEffect(() => {
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (SpeechRecognition) {
          recognitionRef.current = new SpeechRecognition();
          recognitionRef.current.lang = 'cmn-Hant-TW'; 
          recognitionRef.current.continuous = false;
          recognitionRef.current.interimResults = true; 

          recognitionRef.current.onresult = (event) => {
            let interimTranscript = '';
            let finalTranscript = '';

            for (let i = event.resultIndex; i < event.results.length; ++i) {
              if (event.results[i].isFinal) {
                finalTranscript += event.results[i][0].transcript;
              } else {
                interimTranscript += event.results[i][0].transcript;
              }
            }
            
            const rawText = finalTranscript || interimTranscript;
            const traditionalText = simplifyToTraditional(rawText);
            setRecognizedText(traditionalText);
          };

          recognitionRef.current.onerror = (event) => {
            const currentT = TRANSLATIONS[lang];
            if (event.error === 'not-allowed') {
              setErrorMsg(currentT.errMicPermission);
            } else if (event.error === 'no-speech') {
              setErrorMsg(currentT.errNoSpeech);
            } else if (event.error === 'audio-capture') {
              setErrorMsg(currentT.errNoMic);
            } else {
              setErrorMsg(currentT.errMicError.replace('{error}', event.error));
            }
            setIsRecording(false);
          };

          recognitionRef.current.onend = () => {
            setIsRecording(false);
          };
        } else {
          setErrorMsg(TRANSLATIONS[lang].errNoSupport);
        }
      }, [lang]);

        if (!isRecording && recognizedText && recognizedText !== TRANSLATIONS['zh'].teacherPassed && recognizedText !== TRANSLATIONS['en'].teacherPassed) {
          evaluateSpeech();
        }
      }, [isRecording, recognizedText]);

      const progressPercentage = (effectiveProgress / totalSentences) * 100;

          const utterance = new SpeechSynthesisUtterance(targetSentenceObj.text);
          utterance.lang = 'zh-TW'; 
          utterance.rate = 0.85; 
          window.speechSynthesis.speak(utterance);
        } else {
          alert(t.errDemoSpeech);
        }
      };

      const playSingleCharSpeech = (char) => {
        playSound('pop');
        if ('speechSynthesis' in window && !/[，。、！？；：「」『』\s]/.test(char)) {
          window.speechSynthesis.cancel(); 
          const utterance = new SpeechSynthesisUtterance(char);
          utterance.lang = 'zh-TW'; 
          window.speechSynthesis.speak(utterance);
        }
      };

      const startRecording = () => {
        if (isRecording) return; 
        playSound('pop');
        if ('speechSynthesis' in window) {
          window.speechSynthesis.cancel();
        }
        setErrorMsg('');
        setRecognizedText('');
        setResult(null);
        try {
          recognitionRef.current.start();
          setIsRecording(true);
        } catch (e) {
          setErrorMsg(t.errStartMic);
          setIsRecording(false);
        }
      };

      const stopRecording = () => {
        if (recognitionRef.current && isRecording) {
          recognitionRef.current.stop();
          playSound('pop');
        }
      };

      const evaluateSpeech = () => {
        const cleanTarget = removePunctuation(targetSentenceObj.text);
        let cleanRecognized = normalizeNumbers(removePunctuation(recognizedText));

        let matchedChars = [];
        let correctCount = 0;
        
        for (let i = 0; i < targetSentenceObj.text.length; i++) {
          const char = targetSentenceObj.text[i];
          const zhuyin = targetSentenceObj.zhuyin[i];

          if (/[，。、！？；：「」『』\s]/.test(char)) {
             matchedChars.push({ char, zhuyin, isPunc: true, isCorrect: true });
          } else {
             let isMatch = cleanRecognized.includes(char);
             if (!isMatch && HOMOPHONE_ALIASES[char]) {
               isMatch = HOMOPHONE_ALIASES[char].some(alias => cleanRecognized.includes(alias));
             }

             if (isMatch) {
               matchedChars.push({ char, zhuyin, isPunc: false, isCorrect: true });
               correctCount++;
             } else {
               matchedChars.push({ char, zhuyin, isPunc: false, isCorrect: false });
             }
          }
        }

        if (cleanRecognized.length === 0) return;

        const accuracy = correctCount / cleanTarget.length;
        let stars = 0;
        if (accuracy === 1) stars = 3;
        else if (accuracy >= 0.7) stars = 2;
        else if (accuracy >= 0.4) stars = 1;

        setSessionStars(prev => prev + stars);

        const isLastSentence = currentSentenceIndex === totalSentences - 1;

        if (stars > 0 && isLastSentence) {
          playSound('level-clear'); 
          confetti({ particleCount: 300, spread: 120, origin: { y: 0.5 }, colors: ['#FFB020', '#FF5252', '#4CAF50', '#2196F3'] });
        } else if (stars === 3) {
          playSound('success');
          confetti({ particleCount: 80, spread: 60, origin: { y: 0.6 }, colors: ['#FFB020', '#4CAF50'] });
        } else if (stars > 0) {
          playSound('mild-success');
        } else {
          playSound('try-again');
        }

        setResult({ accuracy: Math.round(accuracy * 100), stars, matchedChars });
      };

      const handleNext = () => {
        playSound('pop');
        if ('speechSynthesis' in window) { window.speechSynthesis.cancel(); }
        setRecognizedText('');
        setResult(null);
        setErrorMsg('');
        setCurrentSentenceIndex(prev => prev + 1);
      };

      const toggleFullScreen = () => {
        playSound('pop');
        if (!document.fullscreenElement) {
          document.documentElement.requestFullscreen().catch(err => { console.log(err.message); });
        } else {
          if (document.exitFullscreen) { document.exitFullscreen(); }
        }
      };

      const handleSkip = () => {
        playSound('pop');
        if ('speechSynthesis' in window) {
          window.speechSynthesis.cancel(); 
          const utterance = new SpeechSynthesisUtterance(targetSentenceObj.text);
          utterance.lang = 'zh-TW'; 
          utterance.rate = 0.85; 
          window.speechSynthesis.speak(utterance);
        }

        setRecognizedText(t.teacherPassed);
        setSessionStars(prev => prev + 1); 
        
        let fakeMatched = [];
        for (let i = 0; i < targetSentenceObj.text.length; i++) {
           const char = targetSentenceObj.text[i];
           const zhuyin = targetSentenceObj.zhuyin[i];
           const isPunc = /[，。、！？；：「」『』\s]/.test(char);
           fakeMatched.push({ char, zhuyin, isPunc, isCorrect: true });
        }
        
        setResult({ accuracy: 100, stars: 1, matchedChars: fakeMatched });
        
        const isLastSentence = currentSentenceIndex === totalSentences - 1;
        if(isLastSentence) { playSound('level-clear'); } else { playSound('mild-success'); }
      };

      const finishLesson = () => {
        playSound('pop');
        setIsFlyingAway(true); 
        confetti({ particleCount: 200, spread: 100, origin: { y: 0.6 }, colors: ['#FFB020', '#FF5252', '#4CAF50', '#2196F3', '#9C27B0'] });
        setTimeout(() => { confetti({ particleCount: 300, spread: 150, origin: { y: 0.4 }, colors: ['#FFB020', '#FF5252', '#4CAF50', '#2196F3', '#9C27B0'] }); }, 1200);
        setTimeout(() => { setShowSuccessScreen(true); }, 3200); 
      };

      const scrollLessons = (direction) => {
        if (lessonListRef.current) {
          const scrollAmount = 200;
          lessonListRef.current.scrollBy({ left: direction === 'left' ? -scrollAmount : scrollAmount, behavior: 'smooth' });
        }
      }

      const copyLessonLink = () => {
        playSound('pop');
        const currentUrl = new URL(window.location.href);
        currentUrl.searchParams.set('lesson', selectedLesson.id);
        const urlToCopy = currentUrl.toString();
        const textArea = document.createElement("textarea");
        textArea.value = urlToCopy;
        textArea.style.position = "fixed";
        textArea.style.left = "-999999px";
        textArea.style.top = "-999999px";
        document.body.appendChild(textArea);
        textArea.focus();
        textArea.select();
        try {
            const successful = document.execCommand('copy');
            if (successful) { setCopySuccess(true); setTimeout(() => setCopySuccess(false), 2000); } else { alert(t.errCopy); }
        } catch (err) { alert(t.errCopy); }
        document.body.removeChild(textArea);
      };

      if (!studentName) {
        return (
          <div className="min-h-[100dvh] bg-gradient-to-b from-[#FFF5E1] to-[#FFE4B5] bg-polka font-sans p-0 sm:p-4 flex flex-col items-center justify-center relative overflow-hidden">
            {/* 語言切換按鈕 (首頁) */}
            <div className="absolute top-4 right-4 sm:top-6 sm:right-6 z-50">
              <button onClick={toggleLanguage} className="flex items-center gap-1.5 px-4 py-2 bg-white/80 hover:bg-white text-orange-500 rounded-full font-bold shadow-[0_4px_0_0_#fbd38d] hover:translate-y-[-2px] hover:shadow-[0_6px_0_0_#fbd38d] active:translate-y-[4px] active:shadow-none transition-all border-2 border-orange-200">
                <Globe className="w-5 h-5" /> {lang === 'zh' ? 'EN' : '中'}
              </button>
            </div>
            <div className="bg-white/95 backdrop-blur-sm rounded-none sm:rounded-[3rem] shadow-[0_20px_50px_-12px_rgba(251,146,60,0.3)] p-6 md:p-12 w-full max-w-md h-[100dvh] sm:h-auto flex flex-col justify-center text-center relative overflow-hidden sm:border-[8px] border-white safe-paddings z-10">
              <Sparkles className="absolute top-6 left-6 w-12 h-12 text-yellow-300 opacity-80 animate-pulse" />
              <Sparkles className="absolute bottom-6 right-6 w-12 h-12 text-yellow-300 opacity-80 animate-pulse" style={{ animationDelay: '1s' }} />
              <div className="flex justify-center mb-4 sm:mb-6 animate-gentle-bounce">
                <div className="bg-gradient-to-tr from-orange-100 to-yellow-50 p-4 sm:p-5 rounded-full border-4 border-white shadow-lg">
                  <Award className="w-14 h-14 sm:w-16 sm:h-16 text-orange-400" />
                </div>
              </div>
              <h1 className="text-3xl sm:text-4xl font-bold text-transparent bg-clip-text bg-gradient-to-r from-orange-500 to-pink-500 tracking-wider mb-2 drop-shadow-sm">{t.appTitle}</h1>
              <p className="text-orange-400 font-medium mb-6 tracking-widest text-base sm:text-lg">{t.appSubtitle}</p>
              <div className="bg-orange-50/80 rounded-[2rem] p-5 sm:p-6 mb-6 text-left border-4 border-white shadow-md mx-auto max-w-[280px] sm:max-w-none w-full relative z-10">
                <h3 className="font-bold text-orange-500 mb-4 text-base sm:text-lg flex items-center justify-center gap-1.5"><HelpCircle className="w-5 h-5 sm:w-6 sm:h-6 text-pink-400" /> {t.tipsTitle}</h3>
                <ul className="text-sm sm:text-base text-gray-600 space-y-3 sm:space-y-4 font-medium">
                  <li className="flex items-center gap-3"><div className="bg-white p-2 rounded-full shadow-sm shrink-0 border-2 border-orange-100"><Mic className="w-4 h-4 text-orange-400"/></div><span>{t.tip1}</span></li>
                  <li className="flex items-center gap-3"><div className="bg-white p-2 rounded-full shadow-sm shrink-0 border-2 border-yellow-100"><Star className="w-4 h-4 text-yellow-400 fill-yellow-400"/></div><span>{t.tip2}</span></li>
                  <li className="flex items-center gap-3"><div className="bg-white p-2 rounded-full shadow-sm shrink-0 flex items-center justify-center w-[36px] h-[36px] border-2 border-pink-100"><span className="text-lg">🦋</span></div><span>{t.tip3}</span></li>
                </ul>
              </div>
              <div className="mb-6 sm:mb-8 relative z-10">
                <label className="block text-gray-500 text-lg sm:text-xl font-bold mb-3 sm:mb-4">{t.enterName}</label>
                <input type="text" value={tempName} onChange={(e) => setTempName(e.target.value)} onKeyDown={(e) => { if(e.key === 'Enter' && tempName.trim()) { setStudentName(tempName.trim()); playSound('pop'); } }} className="w-full text-center text-2xl sm:text-3xl font-bold text-orange-500 p-4 sm:p-5 bg-orange-50 border-[4px] border-white shadow-inner rounded-full focus:outline-none focus:ring-4 focus:ring-orange-200 transition-all placeholder-orange-200" placeholder={t.placeholderName} autoFocus />
              </div>
              <button disabled={!tempName.trim()} onClick={() => { setStudentName(tempName.trim()); playSound('pop'); }} className="w-full bg-gradient-to-b from-orange-400 to-orange-500 text-white font-bold text-2xl sm:text-3xl py-4 sm:py-5 rounded-full shadow-[0_6px_0_0_#ea580c] hover:translate-y-[-2px] hover:shadow-[0_8px_0_0_#ea580c] active:translate-y-[6px] active:shadow-none transition-all disabled:opacity-50 disabled:cursor-not-allowed mt-auto sm:mt-0 relative z-10">{t.startBtn}</button>
            </div>
          </div>
        );
      }

      if (showSuccessScreen) {
        return (
          <div className="min-h-[100dvh] bg-gradient-to-b from-[#E0F7FA] to-[#E6E6FA] bg-polka font-sans p-0 sm:p-4 flex flex-col items-center justify-center relative overflow-hidden">
            <div className="bg-white/95 backdrop-blur-sm rounded-none sm:rounded-[3rem] shadow-[0_20px_50px_-12px_rgba(6,182,212,0.3)] p-8 md:p-16 w-full max-w-2xl h-[100dvh] sm:h-auto flex flex-col justify-center text-center relative overflow-hidden sm:border-[8px] border-white animate-fade-in-up safe-paddings z-10">
              <div className="absolute inset-0 bg-cyan-50 opacity-50 bg-[radial-gradient(circle_at_center,_var(--tw-gradient-stops))] from-cyan-100/40 to-transparent"></div>
              <div className="text-[6rem] sm:text-[8rem] animate-gentle-bounce mb-6 relative z-10 drop-shadow-xl" style={{ animationDuration: '2s' }}>🦋</div>
              <h2 className="text-4xl sm:text-5xl font-bold text-transparent bg-clip-text bg-gradient-to-r from-cyan-500 to-blue-500 mb-6 relative z-10 tracking-widest drop-shadow-sm">{t.successTitle}</h2>
              <div className="text-xl sm:text-2xl md:text-3xl text-gray-500 font-medium mb-8 leading-loose relative z-10">
                {t.congrats} <span className="text-pink-500 text-3xl sm:text-4xl md:text-5xl mx-2 font-bold">{studentName}</span> <br className="hidden sm:block"/>
                <span className="sm:hidden"> </span>{t.completed}<br/>
                <span className="text-cyan-600 inline-block mt-4 bg-cyan-50 px-6 py-3 rounded-full border-4 border-white shadow-sm font-bold">{lang === 'zh' ? selectedLesson.title : selectedLesson.titleEn}</span>
              </div>
              <div className="flex justify-center items-center gap-3 mb-10 relative z-10 bg-yellow-50 px-8 py-4 rounded-full border-4 border-white shadow-md inline-flex mx-auto transform rotate-2">
                <Star className="w-10 h-10 text-yellow-400 fill-yellow-400 animate-pulse" />
                <span className="text-2xl sm:text-3xl font-bold text-orange-500">{t.collectedStars.replace('{n}', sessionStars)}</span>
              </div>
              <br/>
              <button onClick={() => { playSound('pop'); setCurrentSentenceIndex(0); setRecognizedText(''); setResult(null); setIsFlyingAway(false); setShowSuccessScreen(false); setSessionStars(0); }} className="px-8 sm:px-12 py-4 sm:py-5 bg-gradient-to-b from-cyan-400 to-cyan-500 text-white rounded-full font-bold text-xl sm:text-2xl shadow-[0_6px_0_0_#0891b2] hover:translate-y-[-2px] hover:shadow-[0_8px_0_0_#0891b2] active:translate-y-[6px] active:shadow-none transition-all relative z-10 inline-block mt-auto sm:mt-0">{t.tryAnother}</button>
            </div>
          </div>
        );
      }

      return (
        <div className="min-h-[100dvh] bg-gradient-to-b from-[#FFF5E1] to-[#FFE4B5] bg-polka font-sans p-0 sm:p-4 md:p-8 flex flex-col items-center relative overflow-hidden">
          <BackgroundDecorations />
          <header className="w-full max-w-4xl bg-white/95 backdrop-blur-sm sm:rounded-[2.5rem] shadow-[0_10px_30px_-10px_rgba(251,146,60,0.2)] p-4 sm:p-6 mb-3 sm:mb-8 text-center border-b-[6px] sm:border-[6px] border-white relative overflow-hidden group shrink-0 pt-safe z-10">
            <Sparkles className="absolute -top-4 -left-4 w-16 h-16 text-yellow-300 opacity-60 group-hover:rotate-12 transition-transform" />
            <Sparkles className="absolute -bottom-4 -right-4 w-16 h-16 text-yellow-300 opacity-60 group-hover:-rotate-12 transition-transform" />
            <h1 className="text-2xl sm:text-3xl md:text-4xl font-bold text-orange-500 flex items-center justify-center gap-2 sm:gap-3 relative z-10 drop-shadow-sm"><Award className="w-8 h-8 sm:w-10 sm:h-10 text-yellow-400 animate-bounce" style={{ animationDuration: '2s' }} /> {t.appTitle} <Award className="w-8 h-8 sm:w-10 sm:h-10 text-yellow-400 animate-bounce" style={{ animationDuration: '2.5s' }} /></h1>
            <p className="text-gray-400 mt-1 sm:mt-2 text-sm sm:text-lg relative z-10 font-medium">{lang === 'zh' ? `${t.littleCaterpillar} ` : ''}<span className="text-pink-400 font-bold">{studentName}</span>{lang === 'en' ? '' : ' '}{t.readingChallenge}</p>
            <div className="absolute top-2 right-2 sm:top-4 sm:right-4 md:top-6 md:right-6 flex flex-col gap-2 z-20 items-end">
              <div className="flex gap-2">
                <button onClick={toggleFullScreen} className={`flex items-center justify-center gap-1.5 px-3 sm:px-4 py-2 rounded-full text-xs sm:text-sm font-bold transition-all sm:w-28 ${isFullscreen ? 'bg-purple-400 text-white shadow-[0_4px_0_0_#9333ea] active:translate-y-[4px] active:shadow-none border-2 border-purple-500' : 'bg-white hover:bg-purple-50 text-purple-500 shadow-[0_4px_0_0_#e9d5ff] hover:translate-y-[-2px] hover:shadow-[0_6px_0_0_#e9d5ff] active:translate-y-[4px] active:shadow-none border-2 border-purple-200'}`} title={t.fullscreen}><Maximize className="w-3 h-3 sm:w-4 sm:h-4" /><span className="hidden sm:inline">{t.fullscreen}</span></button>
                <button onClick={() => { playSound('pop'); setShowZhuyin(!showZhuyin); }} className={`flex items-center justify-center gap-1.5 px-3 sm:px-4 py-2 rounded-full text-xs sm:text-sm font-bold transition-all sm:w-32 ${showZhuyin ? 'bg-orange-400 text-white shadow-[0_4px_0_0_#ea580c] active:translate-y-[4px] active:shadow-none border-2 border-orange-500' : 'bg-white hover:bg-orange-50 text-orange-500 shadow-[0_4px_0_0_#fed7aa] hover:translate-y-[-2px] hover:shadow-[0_6px_0_0_#fed7aa] active:translate-y-[4px] active:shadow-none border-2 border-orange-200'}`}><Type className="w-3 h-3 sm:w-4 sm:h-4" /><span className="hidden sm:inline">{showZhuyin ? t.hideZhuyin : t.showZhuyin}</span><span className="sm:hidden">{showZhuyin ? t.hideMobile : t.zhuyinMobile}</span></button>
              </div>
              <div className="flex gap-2 w-full sm:w-auto justify-end mt-1 sm:mt-0">
                <button onClick={toggleLanguage} className="flex items-center justify-center gap-1.5 px-3 sm:px-4 py-2 rounded-full text-xs sm:text-sm font-bold transition-all bg-white hover:bg-pink-50 text-pink-500 shadow-[0_4px_0_0_#fbcfe8] hover:translate-y-[-2px] hover:shadow-[0_6px_0_0_#fbcfe8] active:translate-y-[4px] active:shadow-none border-2 border-pink-200 whitespace-nowrap"><Globe className="w-3 h-3 sm:w-4 sm:h-4" /><span>{lang === 'zh' ? 'EN' : '中'}</span></button>
                <button onClick={copyLessonLink} className={`flex items-center justify-center gap-1.5 px-3 sm:px-4 py-2 rounded-full text-xs sm:text-sm font-bold transition-all flex-1 sm:flex-none sm:w-auto sm:px-5 ${copySuccess ? 'bg-green-400 text-white shadow-[0_4px_0_0_#16a34a] active:translate-y-[4px] active:shadow-none border-2 border-green-500' : 'bg-white hover:bg-blue-50 text-blue-500 shadow-[0_4px_0_0_#bfdbfe] hover:translate-y-[-2px] hover:shadow-[0_6px_0_0_#bfdbfe] active:translate-y-[4px] active:shadow-none border-2 border-blue-200'}`} title={t.copyLink}>{copySuccess && <span className="flex items-center gap-1"><Check className="w-3 h-3 sm:w-4 sm:h-4" /> {t.copied}</span>}{!copySuccess && <span className="flex items-center gap-1"><LinkIcon className="w-3 h-3 sm:w-4 sm:h-4" /> {t.copyLink}</span>}</button>
              </div>
            </div>
          </header>

          <main className="w-full max-w-4xl flex-1 flex flex-col pb-safe z-10">
            <div className="relative mb-3 sm:mb-6 shrink-0">
              <button onClick={() => scrollLessons('left')} className="absolute left-0 top-1/2 -translate-y-1/2 bg-white p-2 rounded-full shadow-[0_4px_0_0_#fed7aa] active:translate-y-[4px] active:shadow-none z-10 hover:bg-orange-50 hidden md:block border-2 border-orange-100"><svg xmlns="http://www.w3.org/2000/svg" className="h-6 w-6 text-orange-500" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="3"><path strokeLinecap="round" strokeLinejoin="round" d="M15 19l-7-7 7-7" /></svg></button>
              <div ref={lessonListRef} className="flex overflow-x-auto pb-4 gap-3 sm:gap-4 scrollbar-hide snap-x px-4 sm:px-10">
                {LESSONS.map((lesson) => (
                  <button key={lesson.id} onClick={() => { playSound('pop'); setSelectedLesson(lesson); }} className={`whitespace-nowrap px-5 py-3 rounded-2xl text-sm sm:text-base font-bold transition-all snap-start flex-shrink-0 ${selectedLesson.id === lesson.id ? 'bg-gradient-to-b from-orange-400 to-orange-500 text-white shadow-[0_6px_0_0_#ea580c] transform -translate-y-1 border-2 border-orange-400' : 'bg-white text-gray-500 hover:text-orange-500 shadow-[0_4px_0_0_#e5e7eb] hover:translate-y-[-2px] hover:shadow-[0_6px_0_0_#e5e7eb] active:translate-y-[4px] active:shadow-none border-2 border-gray-100'}`}>{lang === 'zh' ? `${lesson.id} ${lesson.title.split('：')[1]}` : lesson.titleEn}</button>
                ))}
              </div>
              <button onClick={() => scrollLessons('right')} className="absolute right-0 top-1/2 -translate-y-1/2 bg-white p-2 rounded-full shadow-[0_4px_0_0_#fed7aa] active:translate-y-[4px] active:shadow-none z-10 hover:bg-orange-50 hidden md:block border-2 border-orange-100"><svg xmlns="http://www.w3.org/2000/svg" className="h-6 w-6 text-orange-500" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="3"><path strokeLinecap="round" strokeLinejoin="round" d="M9 5l7 7-7 7" /></svg></button>
            </div>
            {errorMsg && (
              <div className="bg-red-50 text-red-500 p-4 sm:p-5 rounded-2xl sm:rounded-3xl mb-4 sm:mb-6 flex items-center gap-3 text-sm sm:text-base font-bold animate-bounce shadow-sm border-4 border-white shrink-0 mx-2 sm:mx-0 relative z-10"><AlertCircle className="w-6 h-6 shrink-0 text-red-400" /><span>{errorMsg}</span></div>
            )}
            <div className="bg-white/95 backdrop-blur-sm rounded-t-[2.5rem] sm:rounded-[3rem] shadow-[0_20px_50px_-12px_rgba(251,146,60,0.2)] p-5 sm:p-8 md:p-12 text-center relative overflow-hidden border-t-[8px] sm:border-[8px] border-white z-10 flex-1 flex flex-col">
              {/* 食物裝飾現在放在這裡囉！ */}
              <BackgroundDecorations />
              
              <div className="absolute top-4 sm:top-6 left-4 sm:left-8 text-xs sm:text-sm font-bold text-orange-400 bg-orange-50 px-3 sm:px-4 py-1.5 rounded-full border-2 border-white shadow-sm hidden md:block z-10">{lang === 'zh' ? selectedLesson.title.split('：')[0] : selectedLesson.id}</div>
              <div className="absolute top-4 sm:top-6 right-4 sm:right-8 flex items-center gap-1.5 text-sm sm:text-base font-bold text-yellow-600 bg-yellow-50 px-3 sm:px-4 py-1.5 rounded-full border-2 border-white shadow-sm transform rotate-2 z-10"><Star className="w-4 h-4 sm:w-5 sm:h-5 fill-yellow-400" /> {sessionStars}</div>
              <div className="w-full mb-8 sm:mb-12 mt-10 sm:mt-6 px-2 md:px-16 relative z-50 shrink-0">
                <div className="relative w-full h-8 sm:h-10 bg-green-50 rounded-full border-4 border-white shadow-inner">
                  <div className="absolute top-0 left-0 h-full bg-gradient-to-r from-green-300 to-green-400 rounded-full" style={{ width: `${progressPercentage}%`, ...springTransition }} />
                  {trackNodes.map((nodeEmoji, idx) => {
                    const positionPercentage = ((idx + 1) / totalSentences) * 100;
                    return (<div key={idx} className={`absolute top-1/2 transform -translate-y-1/2 -translate-x-1/2 text-2xl sm:text-3xl transition-all duration-500 ${idx === totalSentences - 1 && effectiveProgress !== totalSentences ? 'animate-pulse' : ''}`} style={{ left: `${positionPercentage}%`, opacity: effectiveProgress > idx ? 0 : 1, filter: effectiveProgress > idx ? 'grayscale(100%)' : 'none', zIndex: 5 }}>{nodeEmoji}</div>);
                  })}
                  <div className="absolute top-1/2 z-50" style={{ left: `${progressPercentage}%`, transform: 'translate(-50%, -50%)', zIndex: isFlyingAway ? 9999 : 50, ...springTransition }}>
                    <div className="transition-all duration-1000 origin-center drop-shadow-lg text-3xl sm:text-4xl" style={ isFlyingAway ? { animation: 'flyAwayCenter 3s ease-in-out forwards' } : { transform: effectiveProgress === totalSentences ? 'scale(1.5)' : effectiveProgress === totalSentences - 1 ? 'scale(1.3)' : `scaleX(-${1 + effectiveProgress * 0.15}) scaleY(${1 + effectiveProgress * 0.15})`, animation: effectiveProgress === totalSentences ? 'fly 2s infinite alternate ease-in-out' : 'none' }}>{effectiveProgress === totalSentences ? '🦋' : effectiveProgress === totalSentences - 1 ? '🏠' : '🐛'}</div>
                  </div>
                </div>
                <div className="text-green-500 font-bold mt-5 tracking-widest text-xs sm:text-sm bg-green-50 inline-block px-4 py-1.5 rounded-full">{t.progress} {effectiveProgress} / {totalSentences}</div>
              </div>
              <div className="mt-2 sm:mt-4 mb-6 sm:mb-12 relative flex-1 flex flex-col justify-center z-10">
                <div className="flex justify-center items-center gap-2 mb-4 sm:mb-6"><h2 className="text-xl sm:text-2xl text-gray-400 font-bold m-0 tracking-widest bg-gray-50 px-5 py-2 rounded-full">{t.readAloud}</h2></div>
                <div className="flex justify-center items-center gap-3 sm:gap-4 mb-6 sm:mb-10 flex-wrap">
                  <button onClick={playDemoSpeech} className="flex items-center gap-2 bg-white text-blue-500 px-5 py-2.5 rounded-full text-sm sm:text-base font-bold transition-all shadow-[0_4px_0_0_#bfdbfe] hover:translate-y-[-2px] hover:shadow-[0_6px_0_0_#bfdbfe] active:translate-y-[4px] active:shadow-none border-2 border-blue-100"><Volume2 className="w-4 h-4 sm:w-5 sm:h-5" /> {t.listenExample}</button>
                  {!result && (<button onClick={handleSkip} className="flex items-center gap-2 bg-white text-gray-500 px-5 py-2.5 rounded-full text-sm sm:text-base font-bold transition-all shadow-[0_4px_0_0_#e5e7eb] hover:translate-y-[-2px] hover:shadow-[0_6px_0_0_#e5e7eb] active:translate-y-[4px] active:shadow-none border-2 border-gray-100"><HelpCircle className="w-4 h-4 sm:w-5 sm:h-5" /> {t.teacherHelp}</button>)}
                </div>
                <div className="text-[2rem] sm:text-4xl md:text-5xl font-bold text-gray-700 leading-[3rem] sm:leading-[4.5rem] flex flex-wrap justify-center items-end min-h-[100px] sm:min-h-[140px]">
                  {result ? (
                    result.matchedChars.map((item, idx) => (
                      <ruby key={idx} className="mx-[4px] sm:mx-[6px] transition-all duration-300 transform hover:scale-110">
                        <span className={`${item.isPunc ? 'text-gray-300' : (item.isCorrect ? 'text-green-500 drop-shadow-md' : 'text-red-400 opacity-80')}`}>{item.char}</span>
                        {showZhuyin && !item.isPunc && (<rt className={`text-base sm:text-xl font-medium font-sans tracking-tighter mb-1 sm:mb-2 ${item.isCorrect ? 'text-green-400' : 'text-red-300'}`}>{item.zhuyin}</rt>)}
                      </ruby>
                    ))
                  ) : (
                    targetSentenceObj.text.split('').map((char, idx) => {
                      const zhuyin = targetSentenceObj.zhuyin[idx];
                      const isPunc = /[，。、！？；：「」『』\s]/.test(char);
                      return (<ruby key={idx} onClick={() => playSingleCharSpeech(char)} className={`mx-[4px] sm:mx-[6px] transition-all duration-300 ${!isPunc ? 'cursor-pointer hover:bg-orange-100 rounded-xl p-1 sm:p-2 group active:scale-95' : ''}`} title={!isPunc ? t.clickToHearMobile : ''}><span className={isPunc ? "text-gray-300" : "text-gray-700 group-hover:text-orange-500 transition-colors"}>{char}</span>{showZhuyin && !isPunc && (<rt className="text-base sm:text-xl text-orange-400 font-medium font-sans tracking-tighter mb-1 sm:mb-2">{zhuyin}</rt>)}</ruby>);
                    })
                  )}
                </div>
              </div>
              <div className="flex flex-col items-center justify-center gap-5 sm:gap-8 relative z-10 mt-auto shrink-0 mb-4 sm:mb-0">
                <button onMouseEnter={() => setIsHoveringMic(true)} onMouseLeave={() => setIsHoveringMic(false)} onClick={isRecording ? stopRecording : startRecording} disabled={isFlyingAway} className={`relative w-24 h-24 sm:w-32 sm:h-32 rounded-full flex items-center justify-center transition-all duration-300 z-10 border-[6px] border-white ${isRecording ? 'bg-red-400 hover:bg-red-500 scale-110 recording-glow shadow-[0_8px_30px_rgba(248,113,113,0.5)]' : isFlyingAway ? 'bg-gray-200 cursor-not-allowed opacity-50' : 'bg-gradient-to-b from-orange-300 to-orange-500 hover:from-orange-400 hover:to-orange-600 shadow-[0_8px_0_0_#ea580c] hover:translate-y-[-2px] hover:shadow-[0_10px_0_0_#ea580c] active:translate-y-[6px] active:shadow-none'}`}>{isRecording ? (<Square className="w-10 h-10 sm:w-14 sm:h-14 text-white animate-pulse" fill="currentColor" />) : (<Mic className={`w-12 h-12 sm:w-16 sm:h-16 text-white transition-transform duration-300 ${isHoveringMic && !isFlyingAway ? 'scale-110 rotate-6' : ''}`} />)}</button>
                <div className="h-8 sm:h-10">{isRecording ? (<p className="text-white font-bold tracking-wider animate-pulse text-sm sm:text-lg bg-red-400 px-5 sm:px-6 py-2 rounded-full shadow-sm">{t.listening}</p>) : (<p className="text-orange-400 font-bold tracking-widest text-sm sm:text-lg bg-orange-50 px-5 py-2 rounded-full">{t.clickMicToStart}</p>)}</div>
              </div>
              <div className={`mt-6 sm:mt-10 transition-all duration-500 shrink-0 relative z-10 ${recognizedText ? 'opacity-100 transform translate-y-0 h-auto mb-4' : 'opacity-0 transform translate-y-4 h-0 overflow-hidden mb-0'}`}><div className="relative min-h-[70px] sm:min-h-[90px] bg-orange-50 rounded-[2rem] p-5 sm:p-8 border-4 border-white shadow-md mx-4 sm:mx-10 mt-4"><div className="absolute -top-4 left-1/2 transform -translate-x-1/2 w-0 h-0 border-l-[15px] border-r-[15px] border-b-[20px] border-l-transparent border-r-transparent border-b-white drop-shadow-sm"></div><div className="absolute -top-4 left-1/2 transform -translate-x-1/2 bg-orange-400 text-white px-3 sm:px-4 py-1 text-[10px] sm:text-xs font-bold tracking-widest rounded-full shadow-sm whitespace-nowrap z-10">{t.micHeard}</div><p className="text-xl sm:text-3xl font-bold text-orange-600 leading-relaxed">{recognizedText}</p></div></div>
            </div>
          </main>

          {/* 獨立在正中央彈出的星星結算畫面 */}
          {result && !isRecording && (
            <div className="fixed inset-0 z-[100] flex items-center justify-center p-4 bg-orange-900/40 backdrop-blur-sm transition-opacity duration-300">
              <div className="bg-white/95 backdrop-blur-md rounded-[3rem] p-6 sm:p-10 md:p-12 max-w-md w-full text-center shadow-[0_20px_50px_-12px_rgba(0,0,0,0.5)] animate-fade-in-up border-[8px] border-white relative">
                <div className="absolute -top-10 left-1/2 transform -translate-x-1/2 bg-yellow-100 p-4 rounded-full border-4 border-white shadow-md animate-gentle-bounce"><Star className="w-10 h-10 text-yellow-500 fill-yellow-500" /></div>
                <div className="flex justify-center gap-4 sm:gap-5 mb-6 sm:mb-10 mt-4 sm:mt-6">
                  {[1, 2, 3].map((star) => (
                    <div key={star} className={`transition-all duration-500 transform ${star <= result.stars ? 'scale-110' : 'scale-90 opacity-40'}`}>
                      <Star className={`w-14 h-14 sm:w-20 sm:h-20 ${star <= result.stars ? 'text-yellow-400 fill-yellow-400 drop-shadow-md' : 'text-gray-300'}`} />
                    </div>
                  ))}
                </div>
                <p className={`text-xl sm:text-3xl font-bold mb-8 sm:mb-12 px-2 ${result.stars === 3 ? 'text-green-500' : 'text-orange-500'}`}>{result.stars === 3 ? t.perfect : result.stars === 2 ? t.good : t.tryAgainMsg}</p>
                
                {/* 修正按鈕排版：強制不換行 (flex-row)，並調整間距與內距 */}
                <div className="flex flex-row justify-center gap-2 sm:gap-4 px-1 sm:px-0">
                  <button onClick={startRecording} disabled={isFlyingAway} className="flex-1 flex items-center justify-center gap-1.5 sm:gap-2 px-3 sm:px-6 py-4 sm:py-5 bg-white text-gray-500 rounded-full font-bold transition-all text-sm sm:text-xl whitespace-nowrap shadow-[0_4px_0_0_#e5e7eb] hover:translate-y-[-2px] hover:shadow-[0_6px_0_0_#e5e7eb] active:translate-y-[4px] active:shadow-none border-2 border-gray-100 disabled:opacity-50">
                    <RefreshCw className="w-4 h-4 sm:w-6 sm:h-6" /> {t.tryAgainBtn}
                  </button>
                  {currentSentenceIndex < totalSentences - 1 ? (
                    <button onClick={handleNext} className="flex-1 flex items-center justify-center gap-1.5 sm:gap-2 px-3 sm:px-6 py-4 sm:py-5 bg-gradient-to-b from-green-400 to-green-500 text-white rounded-full font-bold transition-all text-sm sm:text-xl whitespace-nowrap shadow-[0_4px_0_0_#16a34a] hover:translate-y-[-2px] hover:shadow-[0_6px_0_0_#16a34a] active:translate-y-[4px] active:shadow-none">
                      <Play className="w-4 h-4 sm:w-6 sm:h-6" fill="currentColor" /> {t.nextSentence}
                    </button>
                  ) : (
                    <button onClick={finishLesson} disabled={isFlyingAway} className="flex-1 flex items-center justify-center gap-1.5 sm:gap-2 px-3 sm:px-6 py-4 sm:py-5 bg-gradient-to-b from-yellow-400 to-orange-400 text-white rounded-full font-bold transition-all text-sm sm:text-xl whitespace-nowrap shadow-[0_4px_0_0_#ea580c] hover:translate-y-[-2px] hover:shadow-[0_6px_0_0_#ea580c] active:translate-y-[4px] active:shadow-none animate-bounce">
                      <Award className="w-4 h-4 sm:w-6 sm:h-6" fill="currentColor" /> {t.finishLevel}
                    </button>
                  )}
                </div>
              </div>
            </div>
          )}
        </div>
      );
    }
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
